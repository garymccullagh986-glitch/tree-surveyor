<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0F2018" />
  <title>TreeSurveyor – Power Line Arborist Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest-deep: #0F2018; --forest: #1A3328; --forest-light: #2A4A3A;
      --bark: #7A5230; --bark-light: #A0733F; --leaf: #4A8A5A; --leaf-bright: #5DAF72;
      --cream: #EDE8DC; --cream-dim: #C8C0AE; --sand: #B8A882;
      --danger: #C0392B; --warn: #D4841A; --white: #F5F2EC;
    }
    body { background: var(--forest-deep); color: var(--cream); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    #app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header { background: var(--forest); border-bottom: 2px solid var(--bark); padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    header .icon { font-size: 26px; }
    header .title { font-size: 18px; font-weight: 800; color: var(--white); letter-spacing: 0.5px; }
    header .sub { font-size: 11px; color: var(--sand); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
    header .log-count { margin-left: auto; font-size: 12px; color: var(--sand); font-family: monospace; }

    /* API Banner */
    #api-banner { background: rgba(122,82,48,0.25); border-bottom: 1px solid var(--bark); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #api-banner input { flex: 1; background: var(--forest-deep); border: 1px solid var(--bark); border-radius: 6px; padding: 8px 12px; color: var(--white); font-size: 13px; font-family: monospace; letter-spacing: 1px; outline: none; }
    #api-banner input:focus { border-color: var(--leaf-bright); }
    #api-banner input::placeholder { color: var(--sand); letter-spacing: 0; font-family: system-ui; }
    #api-save-btn { background: var(--bark); border: none; border-radius: 6px; color: var(--white); font-size: 12px; font-weight: 700; padding: 8px 12px; cursor: pointer; white-space: nowrap; }
    #api-key-label { font-size: 11px; color: var(--sand); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
    #api-status { font-size: 11px; color: var(--leaf-bright); font-weight: 600; }

    /* Tabs */
    #tabs { display: flex; background: var(--forest); border-bottom: 1px solid var(--forest-light); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 11px 0; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; color: var(--sand); background: none; border: none; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: var(--leaf-bright); border-bottom-color: var(--leaf-bright); }

    #body { flex: 1; padding: 16px; overflow-y: auto; }

    /* Camera */
    .camera-box { background: var(--forest); border-radius: 10px; border: 1px solid var(--forest-light); overflow: hidden; margin-bottom: 14px; }
    .video-wrapper { position: relative; background: #000; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video, #preview-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .placeholder { text-align: center; color: var(--sand); padding: 30px; }
    .placeholder .ph-icon { font-size: 52px; margin-bottom: 10px; }
    .placeholder p { font-size: 13px; }
    .vf-overlay { position: absolute; inset: 0; pointer-events: none; }
    .corner { position: absolute; width: 26px; height: 26px; }
    .corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--leaf-bright); border-left: 2px solid var(--leaf-bright); border-radius: 2px 0 0 0; }
    .corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--leaf-bright); border-right: 2px solid var(--leaf-bright); border-radius: 0 2px 0 0; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--leaf-bright); border-left: 2px solid var(--leaf-bright); border-radius: 0 0 0 2px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--leaf-bright); border-right: 2px solid var(--leaf-bright); border-radius: 0 0 2px 0; }
    .scan-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 140px; height: 140px; border-radius: 50%; border: 2px solid rgba(93,175,114,0.3); transition: all 0.4s; }
    .scan-ring.active { border-color: var(--leaf-bright); box-shadow: 0 0 18px var(--leaf); animation: pulse 1.2s ease-in-out infinite; }
    #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(15,32,24,0.78); flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 10; }
    #loading-overlay.show { display: flex; }
    .spinner { width: 48px; height: 48px; border: 3px solid var(--forest-light); border-top-color: var(--leaf-bright); border-radius: 50%; animation: spin 0.9s linear infinite; }
    .loading-text { color: var(--leaf-bright); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }

    /* Controls */
    .cam-controls { padding: 12px 14px; display: flex; gap: 10px; align-items: center; }
    .btn { flex: 1; padding: 11px 16px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; transition: all 0.2s; color: var(--white); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn.primary { background: var(--leaf); }
    .btn.primary:hover:not(:disabled) { background: var(--leaf-bright); }
    .btn.secondary { background: var(--forest-light); }
    .btn.secondary:hover { background: #3A5A4A; }
    .btn.bark { background: var(--bark); }
    .upload-label { flex: 1; padding: 11px 16px; border-radius: 7px; background: var(--forest-light); color: var(--white); font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; letter-spacing: 0.5px; transition: background 0.2s; }
    .upload-label:hover { background: #3A5A4A; }

    /* Error */
    .error-box { background: rgba(192,57,43,0.15); border: 1px solid var(--danger); border-radius: 8px; padding: 12px 14px; color: #E07070; font-size: 13px; margin-bottom: 14px; line-height: 1.5; }

    /* Result */
    .result-card { background: var(--forest); border-radius: 10px; border: 1px solid var(--forest-light); margin-bottom: 14px; overflow: hidden; }
    .result-header { background: var(--forest-light); padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .result-species { font-size: 20px; font-weight: 800; color: var(--white); line-height: 1.2; }
    .result-latin { font-size: 12px; color: var(--sand); font-style: italic; margin-top: 3px; }
    .confidence-badge { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--white); white-space: nowrap; flex-shrink: 0; }
    .result-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .info-row { display: flex; gap: 8px; }
    .info-chip { flex: 1; background: var(--forest-light); border-radius: 7px; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
    .chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--sand); }
    .chip-value { font-size: 14px; font-weight: 700; color: var(--white); }
    .chip-value.sm { font-size: 12px; font-weight: 600; }
    .growth-bar-wrap { background: var(--forest-light); border-radius: 7px; padding: 10px 14px; }
    .growth-bar-top { display: flex; justify-content: space-between; align-items: center; }
    .growth-bar-track { margin-top: 7px; background: var(--forest-deep); border-radius: 4px; height: 8px; overflow: hidden; }
    .growth-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .risk-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 7px; }
    .risk-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .risk-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--sand); }
    .risk-text { font-size: 13px; color: var(--cream); margin-top: 3px; line-height: 1.4; }
    .notes-box { background: var(--forest-light); border-radius: 7px; padding: 10px 14px; font-size: 13px; color: var(--cream-dim); line-height: 1.6; }
    .notes-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--sand); margin-bottom: 5px; }
    .feature-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--forest-light); border: 1px solid var(--bark); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--sand); }
    .log-btn { width: 100%; padding: 13px; border-radius: 8px; border: 1px solid var(--bark); background: var(--bark); color: var(--white); font-weight: 700; font-size: 14px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
    .log-btn:hover { background: var(--bark-light); }

    /* Survey Fields */
    .survey-fields { background: var(--forest); border-radius: 10px; border: 1px solid var(--forest-light); padding: 14px; margin-bottom: 14px; }
    .survey-fields-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--sand); margin-bottom: 12px; font-weight: 600; }
    .survey-field { margin-bottom: 10px; }
    .survey-field:last-child { margin-bottom: 0; }
    .survey-field label { display: block; font-size: 12px; font-weight: 600; color: var(--cream-dim); margin-bottom: 5px; letter-spacing: 0.3px; }
    .survey-field input { width: 100%; background: var(--forest-deep); border: 1px solid var(--forest-light); border-radius: 6px; padding: 9px 12px; color: var(--white); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .survey-field input:focus { border-color: var(--leaf-bright); }
    .survey-field input::placeholder { color: var(--sand); font-size: 13px; }

    /* Location / W3W */
    .loc-row { display: flex; gap: 8px; align-items: stretch; }
    .loc-row input { flex: 1; }
    .loc-detect-btn { flex-shrink: 0; padding: 9px 12px; background: var(--forest-light); border: 1px solid var(--leaf); border-radius: 6px; color: var(--leaf-bright); font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 600; transition: all 0.2s; }
    .loc-detect-btn:hover { background: var(--leaf); color: var(--white); }
    .loc-detect-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .loc-hint { font-size: 11px; color: var(--sand); margin-top: 5px; line-height: 1.5; }
    .loc-hint a { color: var(--leaf-bright); text-decoration: none; }
    .loc-coords { font-size: 11px; color: var(--leaf-bright); margin-top: 5px; font-family: monospace; background: var(--forest-deep); padding: 5px 8px; border-radius: 4px; }

    /* Log */
    .log-meta-bar { font-size: 12px; color: var(--sand); margin-bottom: 12px; font-family: monospace; }
    .log-entry { background: var(--forest); border-radius: 8px; border: 1px solid var(--forest-light); padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
    .log-thumb { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--forest-light); }
    .log-thumb-placeholder { width: 56px; height: 56px; border-radius: 6px; background: var(--forest-light); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .log-info { flex: 1; min-width: 0; }
    .log-species { font-size: 14px; font-weight: 700; color: var(--white); }
    .log-ts { font-size: 11px; color: var(--sand); margin-top: 2px; font-family: monospace; }
    .log-growth { font-size: 12px; color: var(--cream-dim); margin-top: 5px; line-height: 1.4; }
    .log-latin { font-size: 11px; color: var(--sand); margin-top: 3px; font-style: italic; }
    .log-meta-chips { display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
    .log-chip { font-size: 11px; color: #B8A882; }
    .log-chip span { color: #5DAF72; font-weight: 600; }
    .empty-log { text-align: center; padding: 50px 20px; color: var(--sand); }
    .empty-log .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-log h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--cream); }
    .empty-log p { font-size: 13px; }
    .export-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .export-btn { flex: 1; padding: 10px; border-radius: 7px; border: 1px solid var(--forest-light); background: var(--forest-light); color: var(--cream); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .export-btn:hover { background: #3A5A4A; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 12px #5DAF72; opacity: 1; } 50% { box-shadow: 0 0 30px #5DAF72; opacity: 0.65; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--forest-deep); }
    ::-webkit-scrollbar-thumb { background: var(--forest-light); border-radius: 2px; }
    canvas { display: none; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="icon">🌲</span>
    <div>
      <div class="title">TreeSurveyor</div>
      <div class="sub">Power Line Arborist Tool</div>
    </div>
    <div class="log-count" id="log-count">0 logged</div>
  </header>

  <div id="api-banner">
    <span id="api-key-label">API Key</span>
    <input type="password" id="api-key-input" placeholder="Enter Anthropic API key…" autocomplete="off" />
    <button id="api-save-btn">Save</button>
    <span id="api-status"></span>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-tab="camera">📷 Identify</button>
    <button class="tab-btn" data-tab="log">📋 Survey Log</button>
  </div>

  <div id="body">
    <div id="tab-camera">
      <div class="camera-box">
        <div class="video-wrapper" id="video-wrapper">
          <div class="placeholder" id="placeholder">
            <div class="ph-icon">🌳</div>
            <p>Start camera or upload a photo</p>
          </div>
          <video id="video" autoplay playsinline muted style="display:none;"></video>
          <img id="preview-img" style="display:none;" alt="Captured tree" />
          <div class="vf-overlay" id="vf-overlay" style="display:none;">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            <div class="scan-ring" id="scan-ring"></div>
          </div>
          <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Analysing tree…</div>
          </div>
        </div>
        <div class="cam-controls" id="cam-controls">
          <button class="btn primary" id="start-cam-btn">📷 Camera</button>
          <label class="upload-label">
            📁 Upload
            <input type="file" id="upload-input" accept="image/*" style="display:none;" />
          </label>
        </div>
      </div>
      <canvas id="canvas"></canvas>
      <div class="error-box" id="error-box" style="display:none;"></div>
      <div id="result-area"></div>
    </div>

    <div id="tab-log" style="display:none;">
      <div id="log-list"></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let apiKey = localStorage.getItem('ts_api_key') || '';
let stream = null;
let capturedDataUrl = null;
let currentResult = null;
let surveyLog = JSON.parse(localStorage.getItem('ts_log') || '[]');

const GROWTH = {
  slow:     { label: 'Slow',     pct: 25, color: '#6BAA75' },
  moderate: { label: 'Moderate', pct: 55, color: '#D4841A' },
  fast:     { label: 'Fast',     pct: 85, color: '#C0392B' },
  unknown:  { label: 'Unknown',  pct: 10, color: '#7A5230' },
};

const SYSTEM_PROMPT = `You are an expert arborist and tree identification specialist. You help utility workers identify trees near power cables to assess trimming schedules.

Analyse the provided image and respond ONLY with a valid JSON object — no markdown, no preamble — in this exact structure:

{"commonName":"Oak","latinName":"Quercus robur","confidence":82,"leafState":"with leaves","identifiedBy":"leaves and bark","growthRate":"slow","annualGrowthCm":"15-30","typicalMatureHeight":"20-40m","powerLineClearance":"High concern - dense canopy with wide lateral spread","trimFrequency":"Every 3-5 years","notes":"Broad canopy spread common in open settings. Branches can reach laterally 12-15m.","identificationFeatures":["Lobed leaves","Grey fissured bark","Broad crown shape"]}

growthRate must be exactly one of: slow, moderate, fast, unknown.
confidence is 0-100. leafState is one of: with leaves, dormant / no leaves, partial, unknown.
identifiedBy describes what visual features identified the tree.
If you cannot identify the tree, set commonName to Unidentified and confidence to 0.`;

// ── API Key ────────────────────────────────────────────────
const apiKeyInput = document.getElementById('api-key-input');
const apiStatus   = document.getElementById('api-status');

function updateApiStatus() {
  if (apiKey) {
    apiKeyInput.value = apiKey;
    apiStatus.textContent = '✓ Key saved';
    apiStatus.style.color = '#5DAF72';
  } else {
    apiStatus.textContent = '';
  }
}
updateApiStatus();

document.getElementById('api-save-btn').addEventListener('click', () => {
  const val = apiKeyInput.value.trim();
  if (!val.startsWith('sk-ant-')) {
    apiStatus.textContent = '⚠ Invalid key';
    apiStatus.style.color = '#E07070';
    return;
  }
  apiKey = val;
  localStorage.setItem('ts_api_key', apiKey);
  updateApiStatus();
});

// ── Tabs ───────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.tab;
    document.getElementById('tab-camera').style.display = t === 'camera' ? '' : 'none';
    document.getElementById('tab-log').style.display    = t === 'log'    ? '' : 'none';
    if (t === 'log') renderLog();
  });
});

// ── Camera ─────────────────────────────────────────────────
const video       = document.getElementById('video');
const previewImg  = document.getElementById('preview-img');
const placeholder = document.getElementById('placeholder');
const vfOverlay   = document.getElementById('vf-overlay');
const scanRing    = document.getElementById('scan-ring');
const camControls = document.getElementById('cam-controls');
const canvas      = document.getElementById('canvas');

function showPlaceholder() { placeholder.style.display=''; video.style.display='none'; previewImg.style.display='none'; vfOverlay.style.display='none'; }
function showVideo() { placeholder.style.display='none'; video.style.display='block'; previewImg.style.display='none'; vfOverlay.style.display=''; scanRing.classList.remove('active'); }
function showPreview(src) { placeholder.style.display='none'; video.style.display='none'; previewImg.src=src; previewImg.style.display='block'; vfOverlay.style.display=''; scanRing.classList.remove('active'); }

function renderCamControls(state) {
  if (state === 'idle') {
    camControls.innerHTML = '<button class="btn primary" id="start-cam-btn">📷 Camera</button><label class="upload-label">📁 Upload<input type="file" id="upload-input" accept="image/*" style="display:none;" /></label>';
    document.getElementById('start-cam-btn').addEventListener('click', startCamera);
    document.getElementById('upload-input').addEventListener('change', handleUpload);
  } else if (state === 'live') {
    camControls.innerHTML = '<button class="btn secondary" id="retake-btn">🔄 Retake</button><button class="btn primary" id="capture-btn">📸 Capture</button><label class="upload-label" style="flex:0.7;">📁<input type="file" id="upload-input" accept="image/*" style="display:none;" /></label>';
    document.getElementById('capture-btn').addEventListener('click', capture);
    document.getElementById('retake-btn').addEventListener('click', retake);
    document.getElementById('upload-input').addEventListener('change', handleUpload);
  } else if (state === 'captured') {
    camControls.innerHTML = '<button class="btn secondary" id="retake-btn">🔄 Retake</button><button class="btn primary" id="analyse-btn">🔍 Identify Tree</button>';
    document.getElementById('retake-btn').addEventListener('click', retake);
    document.getElementById('analyse-btn').addEventListener('click', analyse);
  }
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } } });
    video.srcObject = stream;
    showVideo();
    renderCamControls('live');
    clearError();
  } catch { showError('Camera access denied. Please grant camera permission or upload a photo instead.'); }
}
function stopCamera() { if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } }

function capture() {
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera(); showPreview(capturedDataUrl); renderCamControls('captured'); clearResult();
}

function handleUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { capturedDataUrl = ev.target.result; stopCamera(); showPreview(capturedDataUrl); renderCamControls('captured'); clearResult(); clearError(); };
  reader.readAsDataURL(file);
}

function retake() { stopCamera(); capturedDataUrl = null; currentResult = null; showPlaceholder(); renderCamControls('idle'); clearResult(); clearError(); }

// ── Location ───────────────────────────────────────────────
function detectLocation() {
  const btn = document.getElementById('loc-detect-btn');
  const coordsEl = document.getElementById('loc-coords');
  const w3wInput = document.getElementById('field-w3w');
  if (!navigator.geolocation) { coordsEl.style.display=''; coordsEl.textContent = 'GPS not available on this device.'; return; }
  btn.disabled = true;
  btn.textContent = '⏳ Locating…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      coordsEl.style.display = '';
      coordsEl.textContent = 'GPS: ' + lat + ', ' + lng;
      btn.disabled = false;
      btn.textContent = '📍 Relocate';
      // Open W3W so user can grab the 3-word address for their current location
      window.open('https://what3words.com', '_blank');
    },
    err => {
      coordsEl.style.display = '';
      coordsEl.textContent = 'Could not get location. Enter W3W manually.';
      btn.disabled = false;
      btn.textContent = '📍 Locate';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── Analysis ───────────────────────────────────────────────
async function analyse() {
  if (!capturedDataUrl) return;
  if (!apiKey) { showError('Please enter your Anthropic API key in the field above.'); return; }
  document.getElementById('loading-overlay').classList.add('show');
  scanRing.classList.add('active');
  document.getElementById('analyse-btn').disabled = true;
  clearError();
  try {
    const base64    = capturedDataUrl.split(',')[1];
    const mediaType = capturedDataUrl.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: SYSTEM_PROMPT, messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } }, { type: 'text', text: 'Identify this tree. Return only the JSON object.' }] }] })
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || 'API error ' + res.status); }
    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse identification result.');
    currentResult = JSON.parse(jsonMatch[0]);
    renderResult(currentResult);
  } catch (err) {
    showError('Analysis failed: ' + (err.message || 'Unknown error.'));
  } finally {
    document.getElementById('loading-overlay').classList.remove('show');
    scanRing.classList.remove('active');
    const ab = document.getElementById('analyse-btn');
    if (ab) ab.disabled = false;
  }
}

// ── Result rendering ───────────────────────────────────────
function renderResult(r) {
  const gr = GROWTH[r.growthRate] || GROWTH.unknown;
  const confColor = r.confidence >= 80 ? '#4A8A5A' : r.confidence >= 60 ? '#D4841A' : '#7A5230';
  const riskBg  = r.growthRate === 'fast' ? 'rgba(192,57,43,0.15)' : r.growthRate === 'moderate' ? 'rgba(212,132,26,0.15)' : 'rgba(74,138,90,0.15)';
  const riskBdr = r.growthRate === 'fast' ? '#C0392B' : r.growthRate === 'moderate' ? '#D4841A' : '#4A8A5A';
  const riskIcon = r.growthRate === 'fast' ? '⚡' : r.growthRate === 'moderate' ? '⚠️' : '✅';
  const leafIcon = r.leafState === 'with leaves' ? '🍃' : r.leafState === 'dormant / no leaves' ? '🪵' : '🍂';
  const featureTags = (r.identificationFeatures || []).map(f => '<span class="tag">' + f + '</span>').join('');

  document.getElementById('result-area').innerHTML =
    '<div class="result-card">' +
      '<div class="result-header">' +
        '<div><div class="result-species">' + r.commonName + '</div><div class="result-latin">' + (r.latinName||'') + '</div></div>' +
        '<div class="confidence-badge" style="background:' + confColor + ';">' + r.confidence + '% match</div>' +
      '</div>' +
      '<div class="result-body">' +
        '<div class="info-row">' +
          '<div class="info-chip"><span class="chip-label">Leaf State</span><span class="chip-value">' + leafIcon + ' ' + r.leafState + '</span></div>' +
          '<div class="info-chip"><span class="chip-label">ID Method</span><span class="chip-value sm">' + (r.identifiedBy||'—') + '</span></div>' +
        '</div>' +
        '<div class="growth-bar-wrap"><div class="growth-bar-top"><span class="chip-label">Growth Rate</span><span style="font-size:12px;font-weight:700;color:' + gr.color + ';">' + gr.label + ' — ' + r.annualGrowthCm + ' cm/yr</span></div><div class="growth-bar-track"><div class="growth-bar-fill" style="width:' + gr.pct + '%;background:' + gr.color + ';"></div></div></div>' +
        '<div class="info-row">' +
          '<div class="info-chip"><span class="chip-label">Mature Height</span><span class="chip-value">' + r.typicalMatureHeight + '</span></div>' +
          '<div class="info-chip"><span class="chip-label">Trim Frequency</span><span class="chip-value sm">' + r.trimFrequency + '</span></div>' +
        '</div>' +
        '<div class="risk-row" style="background:' + riskBg + ';border:1px solid ' + riskBdr + ';"><span class="risk-icon">' + riskIcon + '</span><div><div class="risk-label">Power Line Clearance</div><div class="risk-text">' + r.powerLineClearance + '</div></div></div>' +
        (r.notes ? '<div class="notes-box"><div class="notes-label">Arborist Notes</div>' + r.notes + '</div>' : '') +
        (featureTags ? '<div class="feature-tags">' + featureTags + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="survey-fields">' +
      '<div class="survey-fields-title">📐 Site Measurements &amp; Location</div>' +
      '<div class="survey-field"><label for="field-sag">SAG at Tree</label><input type="number" step="any" id="field-sag" placeholder="e.g. 3.2" /></div>' +
      '<div class="survey-field"><label for="field-sd">SD</label><input type="number" step="any" id="field-sd" placeholder="e.g. 4.5" /></div>' +
      '<div class="survey-field"><label for="field-vz">VZ</label><input type="number" step="any" id="field-vz" placeholder="e.g. 1.0" /></div>' +
      '<div class="survey-field"><label for="field-height">Height</label><input type="text" id="field-height" placeholder="e.g. 12m" /></div>' +
      '<div class="survey-field"><label for="field-span">Span</label><input type="text" id="field-span" placeholder="Span reference" /></div>' +
      '<div id="years-clear-box" style="display:none;background:var(--forest-deep);border:1px solid var(--leaf);border-radius:8px;padding:12px 14px;margin-bottom:2px;">' +
        '<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--sand);margin-bottom:4px;">Years Clear  <span style="color:var(--cream-dim);font-size:10px;font-weight:400;">(SD − SAG − VZ) ÷ 5</span></div>' +
        '<div id="years-clear-val" style="font-size:26px;font-weight:800;color:var(--leaf-bright);"></div>' +
      '</div>' +
      '<div class="survey-field">' +
        '<label for="field-w3w">What3Words Location</label>' +
        '<div class="loc-row"><input type="text" id="field-w3w" placeholder="e.g. filled.count.soap" /><button class="loc-detect-btn" id="loc-detect-btn">📍 Locate</button></div>' +
        '<div class="loc-coords" id="loc-coords" style="display:none;"></div>' +
        '<div class="loc-hint">Tap Locate to record GPS coordinates, then open What3Words, allow location access, and paste your 3-word address above.</div>' +
      '</div>' +
    '</div>' +
    '<button class="log-btn" id="add-log-btn">📋 Add to Survey Log</button>';

  document.getElementById('add-log-btn').addEventListener('click', addToLog);
  document.getElementById('loc-detect-btn').addEventListener('click', detectLocation);

  // Live Years Clear calculation
  function recalc() {
    const sd  = parseFloat(document.getElementById('field-sd')?.value)  || null;
    const sag = parseFloat(document.getElementById('field-sag')?.value) || null;
    const vd  = parseFloat(document.getElementById('field-vz')?.value)  || null;
    const box = document.getElementById('years-clear-box');
    const val = document.getElementById('years-clear-val');
    if (sd !== null && sag !== null && vd !== null) {
      const years = (sd - sag - vd) / 5;
      box.style.display = '';
      val.textContent = years.toFixed(2) + ' years';
      val.style.color = years <= 0 ? '#C0392B' : years < 2 ? '#D4841A' : '#5DAF72';
      box.style.borderColor = years <= 0 ? '#C0392B' : years < 2 ? '#D4841A' : 'var(--leaf)';
    } else {
      box.style.display = 'none';
    }
  }
  ['field-sd','field-sag','field-vz'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', recalc);
  });
}

function clearResult() { document.getElementById('result-area').innerHTML = ''; }
function showError(msg) { const b = document.getElementById('error-box'); b.style.display=''; b.textContent='⚠️ ' + msg; }
function clearError() { document.getElementById('error-box').style.display = 'none'; }

// ── Survey Log ─────────────────────────────────────────────
function addToLog() {
  if (!currentResult) return;
  const sag    = (document.getElementById('field-sag')    ||{}).value?.trim()||'';
  const sd     = (document.getElementById('field-sd')     ||{}).value?.trim()||'';
  const vz     = (document.getElementById('field-vz')     ||{}).value?.trim()||'';
  const height = (document.getElementById('field-height') ||{}).value?.trim()||'';
  const span   = (document.getElementById('field-span')   ||{}).value?.trim()||'';
  const w3w    = (document.getElementById('field-w3w')    ||{}).value?.trim()||'';
  const coords = (document.getElementById('loc-coords')   ||{}).textContent?.trim()||'';
  const yearsRaw = (sd !== '' && sag !== '' && vd !== '') ? ((parseFloat(sd) - parseFloat(sag) - parseFloat(vd)) / 5) : null;
  const yearsClear = yearsRaw !== null ? yearsRaw.toFixed(2) : '';
  surveyLog.unshift({ id: Date.now(), image: capturedDataUrl, result: currentResult, timestamp: new Date().toLocaleString('en-GB'), sag, sd, vz, height, span, w3w, coords, yearsClear });
  localStorage.setItem('ts_log', JSON.stringify(surveyLog));
  updateLogCount();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'log'));
  document.getElementById('tab-camera').style.display = 'none';
  document.getElementById('tab-log').style.display = '';
  renderLog();
}

function updateLogCount() {
  document.getElementById('log-count').textContent = surveyLog.length + ' logged';
  document.querySelector('[data-tab="log"]').textContent = '📋 Survey Log (' + surveyLog.length + ')';
}

function renderLog() {
  const container = document.getElementById('log-list');
  if (surveyLog.length === 0) {
    container.innerHTML = '<div class="empty-log"><div class="empty-icon">📋</div><h3>No trees logged yet</h3><p>Identify a tree and tap "Add to Survey Log"</p></div>';
    return;
  }
  const entriesHtml = surveyLog.map(entry => {
    const gr = GROWTH[entry.result.growthRate] || GROWTH.unknown;
    const thumb = entry.image ? '<img class="log-thumb" src="' + entry.image + '" alt="" />' : '<div class="log-thumb-placeholder">🌲</div>';
    const chips = [
      entry.sag        ? '<div class="log-chip"><span>SAG:</span> ' + entry.sag + '</div>' : '',
      entry.sd         ? '<div class="log-chip"><span>SD:</span> ' + entry.sd + '</div>' : '',
      entry.vz         ? '<div class="log-chip"><span>VZ:</span> ' + entry.vz + '</div>' : '',
      entry.height     ? '<div class="log-chip"><span>Height:</span> ' + entry.height + '</div>' : '',
      entry.span       ? '<div class="log-chip"><span>Span:</span> ' + entry.span + '</div>' : '',
      entry.yearsClear ? '<div class="log-chip" style="background:rgba(93,175,114,0.12);border-radius:4px;padding:1px 5px;"><span>Years Clear:</span> <strong style="color:#5DAF72;">' + entry.yearsClear + '</strong></div>' : '',
      entry.w3w        ? '<div class="log-chip"><span>W3W:</span> ///' + entry.w3w + '</div>' : '',
    ].filter(Boolean).join('');
    return '<div class="log-entry">' + thumb +
      '<div class="log-info">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;"><div class="log-species">' + entry.result.commonName + '</div><span style="font-size:11px;color:#B8A882;font-family:monospace;">' + entry.result.confidence + '%</span></div>' +
        '<div class="log-ts">' + entry.timestamp + ' · ' + entry.result.leafState + '</div>' +
        '<div class="log-growth"><span style="color:' + gr.color + ';font-weight:600;">' + gr.label + ' growth</span> · ' + entry.result.annualGrowthCm + ' cm/yr · Trim: ' + entry.result.trimFrequency + '</div>' +
        '<div class="log-latin">' + (entry.result.latinName||'') + '</div>' +
        (chips ? '<div class="log-meta-chips">' + chips + '</div>' : '') +
      '</div></div>';
  }).join('');

  container.innerHTML =
    '<div class="log-meta-bar">' + surveyLog.length + ' tree' + (surveyLog.length!==1?'s':'') + ' surveyed</div>' +
    '<div class="export-row">' +
      '<button class="export-btn" id="export-html-btn">📄 Export Report</button>' +
      '<button class="export-btn" id="clear-log-btn" style="color:#E07070;">🗑 Clear Log</button>' +
    '</div>' + entriesHtml;

  document.getElementById('clear-log-btn').addEventListener('click', () => {
    if (confirm('Clear all survey log entries?')) { surveyLog = []; localStorage.setItem('ts_log','[]'); updateLogCount(); renderLog(); }
  });
  document.getElementById('export-html-btn').addEventListener('click', exportHtmlReport);
}

  const rows = surveyLog.map((entry, i) => {
    const r  = entry.result;
    const gr = GROWTH[r.growthRate] || GROWTH.unknown;
    const riskColor = r.growthRate === 'fast' ? '#C0392B' : r.growthRate === 'moderate' ? '#D4841A' : '#2E7D32';
    const imgTag = entry.image ? '<img src="' + entry.image + '" style="width:100%;max-width:320px;border-radius:6px;border:1px solid #ddd;margin-bottom:10px;" />' : '<div style="width:100%;height:80px;background:#e8e8e8;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;">🌲</div>';
    const features = (r.identificationFeatures||[]).map(f => '<span style="display:inline-block;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:12px;padding:2px 9px;font-size:11px;margin:2px;">' + f + '</span>').join('');

      '<div style="display:flex;gap:16px;flex-wrap:wrap;">' +
        '<div style="flex:0 0 auto;width:180px;">' + imgTag + '</div>' +
        '<div style="flex:1;min-width:200px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">' +
            '<div>' +
              '<div style="font-size:20px;font-weight:800;color:#1A3328;">#' + (i+1) + ' ' + r.commonName + '</div>' +
              '<div style="font-size:12px;color:#888;font-style:italic;">' + (r.latinName||'') + '</div>' +
            '</div>' +
            '<div style="background:' + (r.confidence>=80?'#2E7D32':r.confidence>=60?'#E65100':'#5D4037') + ';color:#fff;padding:4px 10px;border-radius:16px;font-size:12px;font-weight:700;">' + r.confidence + '% match</div>' +
          '</div>' +
          '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px;">' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;width:40%;">Surveyed</td><td style="padding:4px 0;font-weight:600;">' + entry.timestamp + '</td></tr>' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;">Leaf State</td><td style="padding:4px 0;font-weight:600;">' + r.leafState + '</td></tr>' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;">Identified By</td><td style="padding:4px 0;">' + (r.identifiedBy||'—') + '</td></tr>' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;">Growth Rate</td><td style="padding:4px 0;font-weight:700;color:' + gr.color + ';">' + gr.label + ' (' + r.annualGrowthCm + ' cm/yr)</td></tr>' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;">Mature Height</td><td style="padding:4px 0;">' + r.typicalMatureHeight + '</td></tr>' +
            '<tr><td style="padding:4px 8px 4px 0;color:#555;">Trim Frequency</td><td style="padding:4px 0;font-weight:600;">' + r.trimFrequency + '</td></tr>' +
            (entry.sag        ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">SAG at Tree</td><td style="padding:4px 0;">' + entry.sag + '</td></tr>' : '') +
            (entry.sd         ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">SD</td><td style="padding:4px 0;">' + entry.sd + '</td></tr>' : '') +
            (entry.vz         ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">VZ</td><td style="padding:4px 0;">' + entry.vz + '</td></tr>' : '') +
            (entry.yearsClear ? '<tr><td style="padding:4px 8px 4px 0;color:#555;font-weight:600;">Years Clear</td><td style="padding:4px 0;font-weight:800;font-size:15px;color:' + (parseFloat(entry.yearsClear)<=0?'#C0392B':parseFloat(entry.yearsClear)<2?'#D4841A':'#2E7D32') + ';">' + entry.yearsClear + ' yrs</td></tr>' : '') +
            (entry.height     ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">Height</td><td style="padding:4px 0;">' + entry.height + '</td></tr>' : '') +
            (entry.span       ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">Span</td><td style="padding:4px 0;">' + entry.span + '</td></tr>' : '') +
            (entry.w3w    ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">What3Words</td><td style="padding:4px 0;font-weight:600;color:#1A3328;">/// ' + entry.w3w + '</td></tr>' : '') +
            (entry.coords ? '<tr><td style="padding:4px 8px 4px 0;color:#555;">GPS</td><td style="padding:4px 0;font-family:monospace;font-size:12px;">' + entry.coords.replace('GPS: ','') + '</td></tr>' : '') +

    '.report-header h1{font-size:22px;font-weight:800;letter-spacing:0.5px;margin-bottom:4px;}' +
    '.report-header p{font-size:13px;opacity:0.75;}' +
    '.summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}' +
    '.summary-chip{background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px 16px;text-align:center;flex:1;min-width:80px;}' +
    '.summary-chip .num{font-size:22px;font-weight:800;color:#1A3328;}' +
    '.summary-chip .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.6px;}' +
    '@media print{body{padding:12px;background:#fff;}.report-header{border-radius:0;}}</style></head><body>' +
    '<div class="report-header"><h1>🌲 Tree Survey Report</h1><p>Generated: ' + date + ' &nbsp;·&nbsp; ' + surveyLog.length + ' tree' + (surveyLog.length!==1?'s':'') + ' surveyed</p></div>' +
    '<div class="summary-bar">' +
      '<div class="summary-chip"><div class="num">' + surveyLog.length + '</div><div class="lbl">Total Trees</div></div>' +
      '<div class="summary-chip"><div class="num" style="color:#C0392B;">' + surveyLog.filter(e=>e.result.growthRate==='fast').length + '</div><div class="lbl">Fast Growth</div></div>' +
      '<div class="summary-chip"><div class="num" style="color:#D4841A;">' + surveyLog.filter(e=>e.result.growthRate==='moderate').length + '</div><div class="lbl">Moderate</div></div>' +
      '<div class="summary-chip"><div class="num" style="color:#2E7D32;">' + surveyLog.filter(e=>e.result.growthRate==='slow').length + '</div><div class="lbl">Slow Growth</div></div>' +
    '</div>' +
    rows +
    '</body></html>';

  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tree-survey-' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
}
